<!DOCTYPE html>
<html>
<head>
    <title>TalkingBot Controller</title>
    <style>
        body {
            background: #f8f8fa;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #222;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 450px;
            background: #fff;
            margin: 60px auto;
            padding: 32px 24px 36px 24px;
            border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }
        .club-header {
            text-align: center;
            font-size: 2em;
            font-weight: 900;
            letter-spacing: 1px;
            color: #27be67;
            margin-bottom: 6px;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        h1 {
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            color: #2381d1;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        h2 {
            text-align: center;
            margin-bottom: 18px;
            font-weight: 600;
        }
        .button-row {
            display: flex;
            justify-content: space-around;
            margin: 18px 0;
        }
        .control-btn, .mood-btn {
            background: #e1eaff;
            border: none;
            padding: 14px 22px;
            margin: 5px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.15em;
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: background 0.16s, transform 0.09s;
        }
        .control-btn:hover, .mood-btn:hover {
            background: #a4c8ff;
            transform: translateY(-2px) scale(1.05);
        }
        .mood-section {
            text-align: center;
            margin: 26px 0 8px 0;
        }
        .mood-status {
            font-size: 1.3em;
            margin: 0 auto 8px auto;
            padding: 10px;
            width: 70%;
            border-radius: 12px;
        }
        .happy { background: #ffe89e; color: #51571c; }
        .sad { background: #b2dfff; color: #225179; }
        .angry { background: #ffb3b3; color: #891616; }
        .neutral { background: #edece8; color: #605959; }
        .tom-photo {
            width: 110px;
            height: auto;
            border-radius: 30px;
            box-shadow: 0 5px 16px rgba(0,0,0,0.14);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Club name at top -->
        <div class="club-header">CICR</div>

        <!-- Uploaded photo (your TM.jpg) -->
        <div style="text-align:center;">
            <img src="TM.jpg" 
                 alt="Talking Bot Mascot" class="tom-photo">
            <h1>TALKING BOT</h1>
        </div>

        <h2>TalkingBot Control Panel</h2>

        <!-- Mood Section -->
        <div class="mood-section">
            <div id="moodStatus" class="mood-status neutral">😐 Neutral</div>
            <div class="button-row">
                <button class="mood-btn" onclick="setMood('happy')">😊 Happy</button>
                <button class="mood-btn" onclick="setMood('sad')">😢 Sad</button>
                <button class="mood-btn" onclick="setMood('angry')">😠 Angry</button>
                <button class="mood-btn" onclick="setMood('neutral')">😐 Neutral</button>
            </div>
        </div>

        <hr style="margin:26px 0;">

        <!-- Movement Controls -->
        <div style="text-align:center;">
            <div class="button-row">
                <button class="control-btn" onclick="sendCmd('forward')">⬆️ Forward</button>
            </div>
            <div class="button-row">
                <button class="control-btn" onclick="sendCmd('left')">⬅️ Left</button>
                <button class="control-btn" onclick="sendCmd('right')">➡️ Right</button>
            </div>
            <div class="button-row">
                <button class="control-btn" onclick="sendCmd('back')">⬇️ Back</button>
            </div>
            <div class="button-row">
                <button class="control-btn" onclick="sendCmd('stop')">⏹️ Stop</button>
            </div>
            <br>
            <button class="control-btn" onclick="voiceCommand()">🎤 Speak mood or movement</button>
        </div>
    </div>

    <script>
        function sendCmd(cmd) {
            fetch("http://192.168.4.1/" + cmd);
        }

        function voiceCommand() {
            const rec = new webkitSpeechRecognition();
            rec.lang = "en-US";
            rec.start();
            rec.onresult = function(event) {
                let text = event.results[0][0].transcript.toLowerCase();
                alert("You said: " + text);
                sendCmd(text);
            }
        }

        function setMood(mood) {
            const moodDiv = document.getElementById('moodStatus');
            if (mood === 'happy') {
                moodDiv.textContent = "😊 Happy";
                moodDiv.className = "mood-status happy";
            } else if (mood === 'sad') {
                moodDiv.textContent = "😢 Sad";
                moodDiv.className = "mood-status sad";
            } else if (mood === 'angry') {
                moodDiv.textContent = "😠 Angry";
                moodDiv.className = "mood-status angry";
            } else {
                moodDiv.textContent = "😐 Neutral";
                moodDiv.className = "mood-status neutral";
            }
            // Optionally send a command:
            sendCmd(mood);
        }
    </script>
</body>
</html>
